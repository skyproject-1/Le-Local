<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Le Local Business Dashboard">
  <meta name="theme-color" content="#1B2D5B">
  <title>Business Dashboard - Le Local</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=Great+Vibes:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --primary: #E8641A; --primary-light: #ff9f5a; --dark: #1B2D5B; --success: #00B16A; --warning: #F59E0B; --danger: #EF4444; --bg: #f8f9fa; --white: #FFFFFF; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-400: #9ca3af; --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Figtree', sans-serif; background: var(--gray-100); color: var(--gray-900); }
    a { text-decoration: none; color: inherit; }
    
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-box { background: #fff; border-radius: 24px; padding: 48px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo img { width: 80px; height: 80px; border-radius: 16px; margin-bottom: 16px; }
    .login-logo h1 { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: var(--dark); }
    .login-logo p { color: var(--gray-500); margin-top: 8px; }
    .login-form h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--gray-700); }
    .form-group input { width: 100%; padding: 14px 18px; border: 2px solid var(--gray-200); border-radius: 10px; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .login-btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
    .login-btn:hover { background: var(--primary); }
    
    .dashboard { display: none; }
    .dash-header { background: var(--dark); color: #fff; padding: 20px 24px; position: sticky; top: 0; z-index: 100; }
    .dash-header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .dash-logo { display: flex; align-items: center; gap: 12px; }
    .dash-logo img { width: 48px; height: 48px; border-radius: 10px; }
    .dash-logo span { font-family: 'Great Vibes', cursive; font-size: 2rem; }
    .dash-nav { display: flex; gap: 24px; }
    .dash-nav a { font-weight: 600; opacity: 0.8; transition: opacity 0.2s; }
    .dash-nav a:hover, .dash-nav a.active { opacity: 1; }
    .logout-btn { padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 8px; font-weight: 600; }
    
    .dash-content { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .stat-card .number { font-size: 2.5rem; font-weight: 900; color: var(--primary); }
    .stat-card .label { color: var(--gray-500); font-weight: 600; }
    
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-header h2 { font-size: 1.4rem; font-weight: 700; }
    .filter-btns { display: flex; gap: 12px; }
    .filter-btn { padding: 10px 20px; background: #fff; border: 2px solid var(--gray-200); border-radius: 10px; font-weight: 600; cursor: pointer; }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    
    .orders-list { display: flex; flex-direction: column; gap: 16px; }
    .order-card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .order-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
    .order-id { font-size: 1.2rem; font-weight: 700; color: var(--dark); }
    .order-status { padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; }
    .status-new { background: rgba(232,100,26,0.1); color: var(--primary); }
    .status-preparing { background: rgba(59,130,246,0.1); color: #3B82F6; }
    .status-ready { background: rgba(0,177,106,0.1); color: var(--success); }
    .status-delivered { background: rgba(0,177,106,0.1); color: var(--success); }
    .order-customer { margin-bottom: 12px; }
    .order-customer strong { display: block; font-size: 1.1rem; margin-bottom: 4px; }
    .order-customer span { color: var(--gray-500); }
    .order-items { background: var(--gray-100); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-200); }
    .order-item:last-child { border: none; }
    .order-footer { display: flex; justify-content: space-between; align-items: center; }
    .order-total { font-size: 1.3rem; font-weight: 700; color: var(--dark); }
    .order-actions { display: flex; gap: 12px; }
    .action-btn { padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .btn-prepare { background: #3B82F6; color: #fff; }
    .btn-ready { background: var(--success); color: #fff; }
    .btn-complete { background: var(--dark); color: #fff; }
    
    .empty-state { text-align: center; padding: 60px 24px; color: var(--gray-500); }
    .empty-state i { font-size: 4rem; margin-bottom: 16px; opacity: 0.3; }
    
    @media (max-width: 1024px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .stats-row { grid-template-columns: 1fr; } .dash-nav { display: none; } }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="assets/img/lelocal-removebg-preview.png" alt="Le Local">
      <h1>Le Local</h1>
      <p>Business Dashboard</p>
    </div>
    <div class="login-form">
      <h2>Admin Login</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      <button class="login-btn" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
    </div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <header class="dash-header">
    <div class="dash-header-inner">
      <div class="dash-logo">
        <img src="assets/img/lelocal-removebg-preview.png" alt="Le Local">
        <span>Le Local</span>
      </div>
      <nav class="dash-nav">
        <a href="#" class="active" onclick="showTab('orders')">Orders</a>
        <a href="#" onclick="showTab('analytics')">Analytics</a>
      </nav>
      <a href="#" class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </header>
  
  <div class="dash-content">
    <div class="stats-row">
      <div class="stat-card">
        <div class="number" id="todayOrders">0</div>
        <div class="label">Today's Orders</div>
      </div>
      <div class="stat-card">
        <div class="number" id="pendingOrders">0</div>
        <div class="label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="number" id="todayRevenue">£0</div>
        <div class="label">Today's Revenue</div>
      </div>
      <div class="stat-card">
        <div class="number" id="totalOrders">0</div>
        <div class="label">Total Orders</div>
      </div>
    </div>
    
    <div class="section-header">
      <h2>Orders</h2>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="filterOrders('all')">All</button>
        <button class="filter-btn" onclick="filterOrders('pending')">Pending</button>
        <button class="filter-btn" onclick="filterOrders('preparing')">Preparing</button>
        <button class="filter-btn" onclick="filterOrders('delivered')">Delivered</button>
      </div>
    </div>
    
    <div class="orders-list" id="ordersList"></div>
    
    <div id="analyticsSection" style="display:none;padding:24px">
      <div class="section-header">
        <h2>Analytics</h2>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:24px">
        <div class="stat-card" style="background:var(--dark);color:#fff">
          <div class="number" id="totalRevenue">£0</div>
          <div class="label">Total Revenue</div>
        </div>
        <div class="stat-card" style="background:var(--primary);color:#fff">
          <div class="number" id="avgOrderValue">£0</div>
          <div class="label">Avg Order Value</div>
        </div>
      </div>
      <div style="margin-top:32px">
        <h3 style="margin-bottom:16px">Orders by Status</h3>
        <div id="statusChart" style="display:flex;gap:16px;flex-wrap:wrap"></div>
      </div>
      <div style="margin-top:32px">
        <h3 style="margin-bottom:16px">Recent Orders</h3>
        <div id="recentOrdersList"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : 'http://' + window.location.hostname + ':5000';
let orders = [];
let currentFilter = 'all';

async function initDashboard() {
  await loadOrders();
  renderStats();
  renderOrders();
}

async function loadOrders() {
  try {
    const res = await fetch(`${API_BASE_URL}/orders/`);
    const data = await res.json();
    orders = data.orders || [];
  } catch (e) {
    console.error('Failed to load from API, using localStorage:', e);
    const stored = localStorage.getItem('leLocalOrders');
    if (stored) {
      orders = JSON.parse(stored);
    }
  }
}

function renderStats() {
  const today = new Date().toDateString();
  const todayOrders = orders.filter(o => new Date(o.date).toDateString() === today);
  const pending = orders.filter(o => o.status === 'pending' || o.status === 'preparing').length;
  const revenue = todayOrders.reduce((sum, o) => sum + (o.total || 0), 0);
  
  document.getElementById('todayOrders').textContent = todayOrders.length;
  document.getElementById('pendingOrders').textContent = pending;
  document.getElementById('todayRevenue').textContent = '£' + revenue.toFixed(2);
  document.getElementById('totalOrders').textContent = orders.length;
}

function renderOrders() {
  let filtered = orders;
  if (currentFilter !== 'all') {
    filtered = orders.filter(o => o.status === currentFilter);
  }
  filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
  
  const list = document.getElementById('ordersList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No orders found</p></div>';
    return;
  }
  
  list.innerHTML = filtered.map(order => {
    const statusClass = order.status === 'pending' ? 'status-new' : 
                       order.status === 'preparing' ? 'status-preparing' : 
                       order.status === 'ready' ? 'status-ready' : 'status-delivered';
    const items = order.items ? order.items.map(i => `<div class="order-item"><span>${i.name} x${i.qty}</span><span>£${(i.price * i.qty).toFixed(2)}</span></div>`).join('') : '';
    return `
      <div class="order-card">
        <div class="order-header">
          <div class="order-id">#ORD${String(order.id).slice(-4)}</div>
          <div class="order-status ${statusClass}">${order.status || 'pending'}</div>
        </div>
        <div class="order-customer">
          <strong>${order.customer?.name || 'Customer'}</strong>
          <span>${order.customer?.phone || ''}</span><br>
          <span>${order.customer?.address || ''}</span>
        </div>
        <div class="order-items">${items}</div>
        <div class="order-footer">
          <div class="order-total">Total: £${(order.total || 0).toFixed(2)}</div>
          <div class="order-actions">
            ${order.status === 'pending' ? `<button class="action-btn btn-prepare" onclick="updateStatus(${order.id},'preparing')"><i class="fas fa-play"></i> Start</button>` : ''}
            ${order.status === 'preparing' ? `<button class="action-btn btn-ready" onclick="updateStatus(${order.id},'ready')"><i class="fas fa-check"></i> Ready</button>` : ''}
            ${order.status === 'ready' ? `<button class="action-btn btn-complete" onclick="updateStatus(${order.id},'delivered')"><i class="fas fa-check-double"></i> Complete</button>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function filterOrders(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderOrders();
}

function updateStatus(id, status) {
  const order = orders.find(o => o.id === id);
  if (order) {
    order.status = status;
    localStorage.setItem('leLocalOrders', JSON.stringify(orders));
    renderStats();
    renderOrders();
  }
}

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (user === 'admin' && pass === 'le local123') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    initDashboard();
  } else {
    alert('Invalid credentials');
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

function showTab(tab) {
  console.log('Showing', tab);
  document.querySelectorAll('.dash-nav a').forEach(a => a.classList.remove('active'));
  event.target.classList.add('active');
  
  if (tab === 'orders') {
    document.getElementById('ordersList').style.display = 'block';
    document.getElementById('analyticsSection').style.display = 'none';
  } else if (tab === 'analytics') {
    document.getElementById('ordersList').style.display = 'none';
    document.getElementById('analyticsSection').style.display = 'block';
    renderAnalytics();
  }
}

function renderAnalytics() {
  const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
  const avgOrder = orders.length > 0 ? totalRevenue / orders.length : 0;
  document.getElementById('totalRevenue').textContent = '£' + totalRevenue.toFixed(2);
  document.getElementById('avgOrderValue').textContent = '£' + avgOrder.toFixed(2);
  
  const statusCounts = { pending: 0, preparing: 0, ready: 0, delivered: 0 };
  orders.forEach(o => {
    const status = o.status || 'pending';
    if (statusCounts[status] !== undefined) statusCounts[status]++;
  });
  
  const statusColors = { pending: '#EF4444', preparing: '#F59E0B', ready: '#3B82F6', delivered: '#10B981' };
  document.getElementById('statusChart').innerHTML = Object.entries(statusCounts).map(([status, count]) => `
    <div style="padding:16px 24px;background:${statusColors[status]};border-radius:12px;color:#fff;text-align:center">
      <div style="font-size:1.5rem;font-weight:700">${count}</div>
      <div style="font-size:0.8rem;text-transform:uppercase">${status}</div>
    </div>
  `).join('');
  
  const recent = orders.slice(0, 5);
  document.getElementById('recentOrdersList').innerHTML = recent.length ? recent.map(o => `
    <div style="padding:12px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between">
      <div>
        <strong>#ORD${String(o.id).slice(-4)}</strong>
        <span style="color:var(--gray-500)">${o.createdAt || ''}</span>
      </div>
      <div style="font-weight:700">£${(o.total || 0).toFixed(2)}</div>
    </div>
  `).join('') : '<p style="color:var(--gray-500)">No orders yet</p>';
}
</script>

</body>
</html>
